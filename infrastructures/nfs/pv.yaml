apiVersion: v1
kind: PersistentVolume
metadata:
  name: uploads-pv
spec:
  capacity:
    storage: 30Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  mountOptions:
    - vers=3
    - proto=tcp
  nfs:
    server: 10.178.0.3
    path: /mnt/nfs/uploads
  persistentVolumeReclaimPolicy: Retain
