apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  labels:
    app: api-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api-server
          # fluxcd 이미지 자동교체 대상 지정
          # fluxcd.io/containers: api-server
          image: shinyubin/image-converter-api:0.0.1

          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod

            # ─── DB 접속 정보
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_DATASOURCE_URL

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_DATASOURCE_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_DATASOURCE_PASSWORD

            # ─── JPA/Hibernate 옵션 (필요하다면)
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: create

            - name: SPRING_JPA_SHOW_SQL
              value: "false"

            # ─── RabbitMQ (초기 연결 연습용)
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_RABBITMQ_HOST

            - name: SPRING_RABBITMQ_PORT
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_RABBITMQ_PORT

            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_RABBITMQ_USERNAME

            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_RABBITMQ_PASSWORD

            # ─── Redis
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_DATA_REDIS_HOST

            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_DATA_REDIS_PASSWORD

            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: SPRING_DATA_REDIS_PORT

            # ─── JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: JWT_SECRET

            - name: JWT_EXPIRATION_MS
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: JWT_EXPIRATION_MS

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: ClusterIP
  selector:
    app: api-server
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
