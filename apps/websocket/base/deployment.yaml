apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: shinyubin/image-converter-worker:latest
          imagePullPolicy: Always
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: RABBITMQ_URL
            - name: API_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: API_SERVER_URL
